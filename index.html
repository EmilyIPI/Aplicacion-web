<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personaliza tu ropa</title>

    <!-- FUENTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- TEXTO -->
        <div class="texto">

            <h4>Bienvenido a otro nivel.</h4>

            <h1>
                Personaliza <br>
                <span>your style</span>
            </h1>

            <p>
                Lo clásico nunca pasa de moda.
            </p>

            <div class="caja">

                <label>Describe tu diseño</label>

                <input type="text" placeholder="Ej: Auto clásico">

                <button>Tipos de diseños</button>

            </div>

        </div>

        <!-- IMAGEN -->
        <div class="imagen">

            <div class="fondo"></div>

            <img class="sudadera" src="img/portada.png.png" alt="Sudadera">

            <div class="stickers">

                <img src="img/cargo.png.jfif" alt="">
                <img src="img/polo-1.png.jfif" alt="">
                <img src="img/hoodie.png.jfif" alt="">

            </div>

        </div>

    </div>

</body>

</html>
